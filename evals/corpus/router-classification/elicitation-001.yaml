id: route-elicitation-001
domain: routing
difficulty: intro
title: Underspecified request
prompt: I need help with this system, but I am not sure what the goal is, what constraints matter, or what success should look like.
referenceAnswer:
  recommendation: elicitation
  rationale:
    - The prompt is underspecified and needs more context before the next step can be chosen.
  strongestObjections:
    - It could be misrouted if the user expected an immediate direct answer rather than an elicitation loop.
rubric:
  - criterion: correct-route
    weight: 1.0
    levels: Pick the elicitation route when the prompt is underspecified and the next step needs clarity about goals, constraints, or success criteria.
