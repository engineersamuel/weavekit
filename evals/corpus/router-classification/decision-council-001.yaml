id: route-decision-council-001
domain: routing
difficulty: intermediate
title: Decision request
prompt: Should we build our own orchestration layer or adopt Flue for the decision council runtime? Give a recommendation and trade-offs.
referenceAnswer:
  recommendation: decision-council
  rationale:
    - The request is explicitly asking for a recommendation and trade-off analysis across competing options.
  strongestObjections:
    - It could be misrouted if the task were framed as a pure implementation plan rather than a decision.
rubric:
  - criterion: correct-route
    weight: 1.0
    levels: Pick the decision-council route when the request needs a recommendation, trade-off analysis, or choosing among competing options.
