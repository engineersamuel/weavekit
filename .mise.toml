# mise tasks for weavekit. Run with `mise run <task>` (e.g. `mise run council:smoke`).

[tasks."council:smoke"]
description = "Fast single-round, 2-persona decision-council smoke test (gpt-5-mini)."
run = "nub run council decision-council run --smoke --input examples/smoke-question.md --output runs/smoke"
env = { BAML_LOG = "warn", COPILOT_PROXY_API_KEY = "anything" }

[tasks."council:telemetry-local-beads"]
description = "Run the real dynamic decision council with a generated local Beads workflow and Langfuse telemetry."
run = '''
#!/usr/bin/env fish
source .env.fish
set -e OTEL_SDK_DISABLED
set -gx BAML_LOG warn
nub run council decision-council run \
  --input examples/design-question.md \
  --output runs/telemetry-local-beads \
  --max-rounds 3 \
  --create-beads-workflow
'''
