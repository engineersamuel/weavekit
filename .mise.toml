# mise tasks for weavekit. Run with `mise run <task>` (e.g. `mise run council:smoke`).

[tools]
node = "24"
"npm:@nubjs/nub" = "0.2.9"

[tasks.doctor]
description = "Validate workflow entity manifests, prompt references, BAML outputs, and skill capabilities."
run = "nub src/cli.ts entity validate"

[tasks."doctor:sdk"]
description = "Validate configured entity skills against a live Copilot SDK session."
run = "nub scripts/entity-sdk-doctor.ts"

[tasks."pre-commit"]
description = "Fast pre-commit gate: auto-fix/lint staged files with oxlint, auto-format staged files with oxfmt. Install locally with: mise generate git-pre-commit --write"
run = '''
#!/usr/bin/env bash
set -euo pipefail

if [ -z "${STAGED:-}" ]; then
  echo "[pre-commit] No staged files; skipping oxlint/oxfmt."
  exit 0
fi

staged_ts_js=$(echo "$STAGED" | tr ' ' '\n' | grep -E '\.(ts|tsx|js|jsx|mjs|cjs)$' | grep -v '^src/generated/' || true)
if [ -n "$staged_ts_js" ]; then
  echo "[pre-commit] Running oxlint --fix on staged files..."
  echo "$staged_ts_js" | xargs nubx oxlint --fix
fi

# src/generated/** is excluded via .oxfmtrc.json (owned by `baml-cli generate`'s
# own formatter, not oxfmt) but filter it here too for clarity/speed.
staged_formattable=$(echo "$STAGED" | tr ' ' '\n' | grep -E '\.(ts|tsx|js|jsx|mjs|cjs|json|yaml|yml|md)$' | grep -v '^src/generated/' || true)
if [ -n "$staged_formattable" ]; then
  echo "[pre-commit] Running oxfmt on staged files..."
  echo "$staged_formattable" | xargs nubx oxfmt
fi

if [ -z "$staged_ts_js" ] && [ -z "$staged_formattable" ]; then
  echo "[pre-commit] No lintable/formattable files staged."
  exit 0
fi

echo "[pre-commit] Re-staging any files oxlint/oxfmt modified..."
staged_relevant=$(printf '%s\n%s\n' "$staged_ts_js" "$staged_formattable" | sort -u | sed '/^$/d')
if [ -n "$staged_relevant" ]; then
  echo "$staged_relevant" | xargs git add
fi
'''

[tasks."repro:visual-design:live-trace"]
description = "Replay the captured O3 visual-design node against the live LLM with timing traces and a 10-minute local Plan bridge cleanup TTL."
run = "nub run repro:visual-design -- --mode live --trace --bridge-ttl-ms 600000"

[tasks."council:smoke"]
description = "Fast single-round, 2-persona decision-council smoke test (gpt-5-mini)."
run = "nub run council decision-council run --smoke --input examples/smoke-question.md --output runs/smoke"
env = { BAML_LOG = "warn", COPILOT_PROXY_API_KEY = "anything" }

[tasks."source-to-project"]
description = "Run source-to-project advisory mode against weavekit using the prompt argument as the objective/source."
env = { BAML_LOG = "warn", COPILOT_PROXY_BASE_URL = "http://127.0.0.1:8080/v1", COPILOT_PROXY_API_KEY = "anything" }
run = ".mise/tasks/source-to-project"

[tasks."verification-optimizer"]
description = "Run verification-optimizer for a required project with advisory mode by default."
env = { BAML_LOG = "warn", COPILOT_PROXY_BASE_URL = "http://127.0.0.1:8080/v1", COPILOT_PROXY_API_KEY = "anything" }
run = ".mise/tasks/verification-optimizer"

[tasks."router"]
description = "Run router against a quoted prompt and write workflow artifacts under runs/."
env = { BAML_LOG = "warn", COPILOT_PROXY_BASE_URL = "http://127.0.0.1:8080/v1", COPILOT_PROXY_API_KEY = "anything" }
run = ".mise/tasks/router"

[tasks."optimize-template"]
description = "Run the offline template optimizer for a static workflow template."
env = { BAML_LOG = "warn", COPILOT_PROXY_BASE_URL = "http://127.0.0.1:8080/v1", COPILOT_PROXY_API_KEY = "anything" }
run = ".mise/tasks/optimize-template"

[tasks."optimize-template:apply"]
description = "Apply or dry-run a template optimizer recommendation package."
run = ".mise/tasks/optimize-template-apply"

[tasks."source-to-project:optimize-template"]
description = "Run source-to-project template optimization, dry-run apply, and open the artifacts."
env = { BAML_LOG = "warn", COPILOT_PROXY_BASE_URL = "http://127.0.0.1:8080/v1", COPILOT_PROXY_API_KEY = "anything" }
run = ".mise/tasks/source-to-project-optimize-template"

[tasks."source-to-project:optimize-template:open"]
description = "Open artifacts for a source-to-project template optimizer run."
run = ".mise/tasks/source-to-project-optimize-template-open"

[tasks."source-to-project:optimize-template:ui"]
description = "Start the source-to-project template optimizer run browser."
run = ".mise/tasks/source-to-project-optimize-template-ui"

[tasks."source-to-project:try-optimized-template"]
description = "Run source-to-project through a template optimizer candidate without replacing the checked-in template."
env = { BAML_LOG = "warn", COPILOT_PROXY_BASE_URL = "http://127.0.0.1:8080/v1", COPILOT_PROXY_API_KEY = "anything" }
run = ".mise/tasks/source-to-project-try-optimized-template"

[tasks.dashboard]
description = "Start the workflow dashboard for recorded runs."
run = '''
#!/usr/bin/env bash
set -euo pipefail

nubx portless run --name weavekit-dashboard nub src/cli.ts workflow dashboard \
  --watch-dir runs
'''
