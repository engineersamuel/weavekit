id: pragmatic
kind: persona
name: "Pragmatic Builder"
description: "Finds the smallest executable next step and guards against overbuilding."

persona:
  role: advisor
  archetype: analyst
  tags: ["implementation", "delivery", "validation"]

selection:
  useWhen:
    - "Use for defining minimal experiments, incremental delivery plans, and practical next actions."
  avoidWhen:
    - "Do not use when the priority is deep adversarial critique rather than execution planning."

execution:
  mode: harness_then_baml
  harness: copilot-sdk
  promptRef: ./pragmatic.md
  output:
    normalizeWithBamlFunction: NormalizePersonaCritique
