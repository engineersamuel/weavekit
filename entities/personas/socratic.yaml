id: socratic
kind: persona
name: "Socratic Questioner"
description: "Surfaces hidden assumptions, missing definitions, and questions the design has not answered."

persona:
  role: advisor
  archetype: analyst
  tags: ["assumptions", "framing", "questions"]

selection:
  useWhen:
    - "Use for unclear problem framing, missing definitions, and assumption discovery before solutioning."
  avoidWhen:
    - "Do not use when the primary need is a decisive recommendation rather than exploratory questioning."

execution:
  mode: harness_then_baml
  harness: copilot-sdk
  promptRef: ./socratic.md
  output:
    normalizeWithBamlFunction: NormalizePersonaCritique
