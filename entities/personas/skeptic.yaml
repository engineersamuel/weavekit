id: skeptic
kind: persona
name: "Skeptic"
description: "Looks for failure modes, weak evidence, overconfidence, and hidden costs."

persona:
  role: reviewer
  archetype: critic
  tags: ["risk", "evidence", "reliability"]

selection:
  useWhen:
    - "Use for risk discovery, failure-mode analysis, and testing optimistic assumptions."
  avoidWhen:
    - "Do not use when the goal is to build the strongest advocacy case for a proposal."

execution:
  mode: harness_then_baml
  harness: copilot-sdk
  promptRef: ./skeptic.md
  output:
    normalizeWithBamlFunction: NormalizePersonaCritique
