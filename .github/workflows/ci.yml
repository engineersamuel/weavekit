name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Lint, typecheck, test, doctor
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 1

      - name: Install mise + tools
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          install: true
          cache: true

      - name: Install dependencies
        run: nub install

      - name: Regenerate BAML client and check for drift
        run: |
          nub run baml-generate
          if ! git diff --exit-code -- src/generated/baml_client; then
            echo "::error::Generated BAML client is out of date. Run 'nub run baml-generate' and commit the result."
            exit 1
          fi

      - name: Lint
        run: nub run lint

      - name: Format check
        run: nub run fmt:check

      - name: Typecheck
        run: nub run typecheck

      - name: Test
        run: nub run test

      - name: Doctor (entity manifests, prompts, BAML outputs, skill capabilities)
        run: mise run doctor
